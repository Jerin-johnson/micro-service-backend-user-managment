version: "3.9"

services:
  # ---------------- API GATEWAY ----------------
  api-gateway:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "5000:5000"
    env_file:
      - ./api_gateway/.env.docker
    depends_on:
      - auth-service
      - user-service
      - reporting-service

  # ---------------- AUTH SERVICE ----------------
  auth-service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "5001:5001"
    env_file:
      - ./auth_service/.env.docker
    depends_on:
      - mysql

  # ---------------- USER SERVICE ----------------
  user-service:
    build: ./user_service
    container_name: user_service
    ports:
      - "5002:5002"
      - "50051:50051"
    env_file:
      - ./user_service/.env.docker
    depends_on:
      - mongo

  # ---------------- REPORTING SERVICE ----------------
  reporting-service:
    build: ./reporting_service
    container_name: reporting_service
    ports:
      - "5003:5003"
    env_file:
      - ./reporting_service/.env.docker
    depends_on:
      - mongo

  # ---------------- MONGO DB ----------------
  mongo:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - mongo_data:/data/db

  # ---------------- MYSQL ----------------
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 2003
      MYSQL_DATABASE: mydb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mongo_data:
  mysql_data:
