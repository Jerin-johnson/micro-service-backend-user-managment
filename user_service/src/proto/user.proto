syntax = "proto3";

package user;

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message CreateUserRequest {
  int32  auth_user_id = 1;
  string email        = 2;
  string name         = 3;
  string role         = 4;
}

message CreateUserResponse {
  int32  user_id = 1;
  bool   success = 2;
  string message = 3;
}